name: Fetch Nepal Election Results

on:
  schedule:
    - cron: '*/5 * * * *'   # GitHub minimum = 5 min, but we fetch 3x inside = ~2 min updates
  workflow_dispatch:          # manual trigger from GitHub Actions tab
  push:
    branches: [main]          # runs on first push to populate data.json immediately

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch #1 — immediate
        run: |
          python3 scripts/fetch.py
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: fetch 1/3 [$(date -u '+%H:%M UTC')]"
          git push
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait 2 minutes
        run: sleep 120

      - name: Fetch #2 — +2 min
        run: |
          git pull
          python3 scripts/fetch.py
          git add data.json
          git diff --staged --quiet || git commit -m "data: fetch 2/3 [$(date -u '+%H:%M UTC')]"
          git push
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait 2 more minutes
        run: sleep 120

      - name: Fetch #3 — +4 min
        run: |
          git pull
          python3 scripts/fetch.py
          git add data.json
          git diff --staged --quiet || git commit -m "data: fetch 3/3 [$(date -u '+%H:%M UTC')]"
          git push
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}